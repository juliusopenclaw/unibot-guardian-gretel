name: UniBot nightly evidence

on:
  schedule:
    - cron: "17 2 * * *"
  workflow_dispatch:
  push:
    tags:
      - "v*-rc*"
  release:
    types: [prereleased, published]

permissions:
  contents: read

jobs:
  full-evidence:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev]'
      - run: python -m pytest -q
      - run: python scripts/unibot_pipeline_smoke.py --json > unibot-smoke.json
      - uses: actions/upload-artifact@v4
        with:
          name: unibot-nightly-evidence
          path: unibot-smoke.json
          retention-days: 30
