name: UniBot CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,glm]'
      - name: Run cross-version product gates
        run: >
          python -m pytest -q
          tests/test_unibot_api_and_public_safety.py
          tests/test_unibot_api_security_v2.py
          tests/test_unibot_autonomy_v2.py
          tests/test_unibot_bachelor_thesis.py
          tests/test_unibot_browser_extension_v2.py
          tests/test_unibot_cli_v2.py
          tests/test_unibot_evaluation.py
          tests/test_unibot_gateway_v2.py
          tests/test_unibot_glm_provider_v2.py
          tests/test_unibot_notebook_intake.py

  quality:
    name: Public safety and quality
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: python -m pip install -e '.[dev,glm]'
      - run: python -m ruff check unibot/autonomy_v2.py unibot/glm_provider.py unibot/notebook_intake.py unibot/gateway.py unibot/cli.py
      - run: python -m mypy unibot/autonomy_v2.py unibot/glm_provider.py unibot/notebook_intake.py unibot/gateway.py unibot/cli.py
      - run: python -m pip_audit
      - run: python -m unibot.cli autonomy preflight --json
      - run: python -m unibot.cli public-safety
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  browser-e2e:
    name: Browser mantle E2E
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run test:browser
